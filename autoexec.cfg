// Cmd Developer + (old)Showing Map of Match when Ready
developer 1
con_filter_enable 2
con_filter_text_out "game:mapgroupname"
con_filter_text "game:map"


//Watch Small Icone Above TeamMates Heads From Walls and Weapons
cl_teamid_overhead_always 1
+cl_show_team_equipment


//Jump Throw
alias "+jumpthrow" "+jump;-attack"
alias "-jumpthrow" "-jump"
bind "v" "+jumpthrow"


//Nades
bind "x" "use weapon_flashbang"
bind "c" "use weapon_hegrenade"
bind "z" "use weapon_smokegrenade"
bind "4" "use weapon_incgrenade;use weapon_molotov"
bind "5" "use weapon_c4"
bind "6" "use weapon_decoy"
bind "7" "use weapon_c4;use weapon_healthshot"
bind "8" "use holdpos"
bind "\" "use weapon_knife; use weapon_c4; drop; slot1"
unbind mwheeldown
unbind mwheelup
bind "p" "say Greetings. It is the greatest of pleasures and honors to meet you. Upon facing you on the battlefield ahead, I want to wish you the best luck, amazing fun, and a gloriusly Good Game from the very humble beginning to any bitter ends."
bind "l" "say Youtube.com/Digui13"
bind "k" "say Twitch.tv/Digui13"
bind "o" "say ❤"

// Reset Cinematic Keys
unbind "MOUSE1"
unbind "MOUSE2"
unbind "F1"
unbind "F2"
unbind "SPACE"
unbind "ENTER"


// Set Normal Keys
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "ESCAPE" "cancelselect"
bind "SPACE" "+jump"
bind "ENTER" "+attack"


// My configs
sensitivity 1.3


// my Crossair
cl_crosshair_drawoutline "0.000000"
cl_crosshair_dynamic_maxdist_splitratio "0.35"
cl_crosshair_dynamic_splitalpha_innermod "1"
cl_crosshair_dynamic_splitalpha_outermod "0.3"
cl_crosshair_dynamic_splitdist "1"
cl_crosshair_outlinethickness "0.500000"
cl_crosshair_sniper_show_normal_inaccuracy "0"
cl_crosshair_sniper_width "1"
cl_crosshair_t "0.000000"
cl_crosshairalpha "255.000000"
cl_crosshaircolor "5.000000"
cl_crosshaircolor_b "0.000000"
cl_crosshaircolor_g "0.000000"
cl_crosshaircolor_r "255.000000"
cl_crosshairdot "0.000000"
cl_crosshairgap "-4.000000"
cl_crosshairgap_useweaponvalue "0"
cl_crosshairscale "0"
cl_crosshairsize "0.500000"
cl_crosshairstyle "4.000000"
cl_crosshairthickness "2.000000"
cl_crosshairusealpha "1"
cl_fixedcrosshairgap "0"


//my Radar
cl_hud_radar_scale 1.30
cl_radar_always_centered "0"
cl_radar_icon_scale_min 0.5
cl_radar_rotate "0"
cl_radar_scale 0.4
cl_radar_square_with_scoreboard 0
cl_radar_rotate 1


// Ordens Radio

cl_scoreboard_mouse_enable_binding "+attack2"






